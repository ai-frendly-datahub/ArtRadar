name: ArtRadar PR Checks
on:
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: |
          ruff check artradar/ tests/
          black --check artradar/ tests/
      - name: Type check
        run: mypy artradar/
      - name: Unit tests
        run: pytest tests/unit -v --tb=short
