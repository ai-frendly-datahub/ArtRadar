name: ArtRadar Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TZ: Asia/Seoul
  PYTHON_VERSION: "3.11"

concurrency:
  group: artradar-collection
  cancel-in-progress: false

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "radar-core @ git+https://github.com/ai-frendly-datahub/radar-core.git@main"
          pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Run ArtRadar categories
        run: |
          python main.py --category art --recent-days 7 --keep-days 90 --keep-raw-days 180 --keep-report-days 90 --snapshot-db --generate-report
          python main.py --category artwork --recent-days 30 --keep-days 180 --keep-raw-days 180 --keep-report-days 90 --snapshot-db --generate-report
      - name: Generate index.html
        run: |
          python -c "from artradar.reporter import generate_index_html; from pathlib import Path; generate_index_html(Path('reports'))"
      - name: Auto-commit data updates
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update radar data [skip ci]"
          file_pattern: data/*.duckdb
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./reports
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "docs: update art radar report"
      - name: Archive DuckDB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artradar-db-${{ github.run_number }}
          path: data/art_data.duckdb
          retention-days: 30
          if-no-files-found: ignore
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.NOTIFICATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "status": "failure",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }' || true
