category_name: "art"
display_name: "미술 레이더"

sources:
  # === 국내 미술 뉴스 ===
  - name: "월간미술"
    type: "rss"
    url: "https://monthlyart.com/feed/"

  - name: "데일리아트"
    type: "rss"
    url: "https://www.d-art.co.kr/rss/allArticle.xml"

  - name: "아트인사이트"
    type: "rss"
    url: "https://www.artinsight.co.kr/rss/allArticle.xml"

  - name: "네오룩"
    type: "javascript"
    url: "https://neolook.com/archives/review"
    config:
      wait_for: ".entry-list"

  - name: "아트앤컬쳐"
    type: "javascript"
    url: "https://www.artandculture.or.kr/user/column/columnList.do"
    config:
      wait_for: ".list_wrap"

  # === 글로벌 미술 뉴스 ===
  - name: "Artnet News"
    type: "rss"
    url: "https://news.artnet.com/feed"

  - name: "ARTnews"
    type: "rss"
    url: "https://www.artnews.com/feed/"

  - name: "Artforum"
    type: "rss"
    url: "https://www.artforum.com/feed/"

  - name: "Hyperallergic"
    type: "rss"
    url: "https://hyperallergic.com/feed/"

  - name: "The Art Newspaper"
    type: "rss"
    url: "https://www.theartnewspaper.com/rss.xml"

  - name: "e-flux"
    type: "rss"
    url: "https://www.e-flux.com/rss/"

  - name: "Artsy"
    type: "rss"
    url: "https://www.artsy.net/rss/news"

  - name: "Frieze"
    type: "rss"
    url: "https://www.frieze.com/rss"

  - name: "Colossal"
    type: "rss"
    url: "https://www.thisiscolossal.com/feed/"

  - name: "ArtDaily"
    type: "rss"
    url: "https://artdaily.com/rss.xml"

  # === 미술관 API ===
  - name: "Metropolitan Museum"
    type: "met_museum"
    url: "https://collectionapi.metmuseum.org/public/collection/v1/objects"

  - name: "Art Institute of Chicago"
    type: "aic"
    url: "https://api.artic.edu/api/v1/artworks"

  # === 한국 미술관/갤러리 (Playwright) ===
  - name: "국립현대미술관"
    type: "javascript"
    url: "https://www.mmca.go.kr/exhibitions/progressList.do"
    config:
      wait_for: ".exhibition_list"

  - name: "서울시립미술관"
    type: "javascript"
    url: "https://sema.seoul.go.kr/kr/whatson/exhibition/list"
    config:
      wait_for: ".list_wrap"

  - name: "아르코미술관"
    type: "javascript"
    url: "https://www.arko.or.kr/artcenter/program/exhibit/"
    config:
      wait_for: ".list_area"

  - name: "리움미술관"
    type: "javascript"
    url: "https://www.leeum.org/exhibition"
    config:
      wait_for: ".exhibition-list"

  - name: "국립중앙박물관"
    type: "javascript"
    url: "https://www.museum.go.kr/site/main/exhiSpecialList"
    config:
      wait_for: ".exhibit_list"

  - name: "대림미술관"
    type: "javascript"
    url: "https://www.daelimmuseum.org/exhibition/"
    config:
      wait_for: ".exhi_list"

  # === 경매/아트마켓 ===
  - name: "서울옥션"
    type: "javascript"
    url: "https://www.seoulauction.com/main/auction"
    config:
      wait_for: ".auction_list"

  - name: "케이옥션"
    type: "javascript"
    url: "https://www.k-auction.com/Auction/Major"
    config:
      wait_for: ".auction_content"

entities:
  - name: "Genre"
    display_name: "미술 장르"
    keywords:
      # 한국어
      - "회화"
      - "유화"
      - "수채화"
      - "동양화"
      - "한국화"
      - "수묵화"
      - "민화"
      - "조각"
      - "판화"
      - "사진"
      - "설치미술"
      - "미디어아트"
      - "영상예술"
      - "행위예술"
      - "퍼포먼스"
      - "개념미술"
