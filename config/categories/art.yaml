category_name: "art"
display_name: "Art Radar"

sources:
  # === 국내 미술 뉴스 ===
  - name: "월간미술"
    type: "rss"
    url: "https://monthlyart.com/feed/"
  - name: "데일리아트"
    type: "rss"
    url: "https://www.d-art.co.kr/rss/allArticle.xml"
  
  # === 글로벌 미술 뉴스 ===
  - name: "Artnet News"
    type: "rss"
    url: "https://news.artnet.com/feed"
  - name: "ARTnews"
    type: "rss"
    url: "https://www.artnews.com/feed/"
  - name: "Artforum"
    type: "rss"
    url: "https://www.artforum.com/feed/"
  - name: "ArtSelector"
    type: "rss"
    url: "https://www.artselector.com/feed/"
  
  # === 미술관 API ===
  - name: "Metropolitan Museum"
    type: "met_museum"
    url: "https://collectionapi.metmuseum.org/public/collection/v1/objects"
  - name: "Art Institute of Chicago"
    type: "aic"
    url: "https://api.artic.edu/api/v1/artworks"


  # === JavaScript-rendered sources (Playwright) ===
  - name: "MMCA 전시"
    type: "javascript"
    url: "https://www.mmca.go.kr/exhibitions/progressList.do"
  - name: "서울시립미술관"
    type: "javascript"
    url: "https://sema.seoul.go.kr/kr/whatson/exhibition/list"
  - name: "아르코미술관"
    type: "javascript"
    url: "https://www.arko.or.kr/artcenter/program/exhibit/"

entities:
  - name: "Genre"
    display_name: "미술 장르"
    keywords:
      - "painting"
      - "sculpture"
      - "drawing"
      - "printmaking"
      - "photography"
      - "installation"
      - "video art"
      - "digital art"
      - "performance art"
      - "conceptual art"
      - "abstract art"
      - "figurative art"

  - name: "Period"
    display_name: "미술 시대"
    keywords:
      - "renaissance"
      - "baroque"
      - "rococo"
      - "neoclassical"
      - "romantic"
      - "impressionism"
      - "post-impressionism"
      - "modernism"
      - "contemporary"
      - "ancient"
      - "medieval"
      - "classical"

  - name: "Market"
    display_name: "미술 시장"
    keywords:
      - "auction"
      - "gallery"
      - "collector"
      - "investment"
      - "valuation"
      - "provenance"
      - "appraisal"
      - "sale"
      - "acquisition"
      - "market trend"
      - "price record"
      - "art fair"

  - name: "Institution"
    display_name: "미술 기관"
    keywords:
      - "museum"
      - "gallery"
      - "foundation"
      - "institute"
      - "academy"
      - "biennale"
      - "exhibition"
      - "collection"
      - "curator"
      - "conservator"
      - "restoration"
      - "preservation"

  - name: "Topic"
    display_name: "미술 주제"
    keywords:
      - "technique"
      - "composition"
      - "color theory"
      - "perspective"
      - "symbolism"
      - "iconography"
      - "cultural heritage"
      - "art history"
      - "artist biography"
      - "exhibition review"
      - "art criticism"
      - "aesthetic theory"
