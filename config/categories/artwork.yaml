category_name: "artwork"
display_name: "Artwork Radar"

sources:
  - name: "Metropolitan Museum"
    type: "met_museum"
    url: "https://collectionapi.metmuseum.org/public/collection/v1/objects"
  - name: "Art Institute of Chicago"
    type: "aic"
    url: "https://api.artic.edu/api/v1/artworks"
  - name: "Smithsonian"
    type: "smithsonian"
    url: "https://api.si.edu/openaccess/api/v1.0/search"

entities:
  - name: "Medium"
    display_name: "작품 매체"
    keywords:
      - "oil on canvas"
      - "watercolor"
      - "bronze"
      - "ceramic"
      - "photograph"
      - "glass"
      - "textile"
      - "wood"
      - "marble"
      - "ink"
      - "digital"
      - "mixed media"

  - name: "ArtworkType"
    display_name: "작품 유형"
    keywords:
      - "portrait"
      - "landscape"
      - "still life"
      - "chair"
      - "table"
      - "vase"
      - "lamp"
      - "drawing"
      - "print"
      - "sculpture"
      - "window"
      - "installation"

  - name: "Artist"
    display_name: "작가 정보"
    keywords:
      - "designed by"
      - "made by"
      - "artist"
      - "painter"
      - "sculptor"
      - "studio"
      - "attributed to"
      - "workshop"
      - "creator"
      - "decorated by"

  - name: "CollectionChange"
    display_name: "소장품 변화"
    keywords:
      - "acquired"
      - "donated"
      - "gift"
      - "accession"
      - "collection"
      - "on view"
      - "loan"
      - "archive"
      - "catalogued"
      - "restored"

  - name: "Period"
    display_name: "작품 시대"
    keywords:
      - "renaissance"
      - "baroque"
      - "rococo"
      - "modern"
      - "contemporary"
      - "ancient"
      - "medieval"
      - "19th century"
      - "20th century"
      - "impressionist"
